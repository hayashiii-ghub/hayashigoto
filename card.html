<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>card/ | はやしごと</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header-nav">
        <a href="/">/home</a>
        <a href="/#about">/about</a>
        <a href="/#contact">/contact</a>
      </nav>
    </header>

    <main>
      <section class="dir-section work-detail">
        <div class="dir-section-inner">
          <h1 class="cli-line">
            <span class="cli-prompt">></span> <span class="cli-cmd">open</span> <span class="cli-path"><a href="/#about" class="cli-path-link">/about</a>/card/</span>
          </h1>

          <div class="card-controls" aria-label="名刺ビューアー操作">
            <button type="button" class="card-btn" data-card-action="flip" aria-pressed="false">show back</button>
            <button type="button" class="card-btn" data-card-action="orientation" aria-pressed="false">landscape</button>
            <button type="button" class="card-btn" data-card-action="reset">reset</button>
          </div>

          <div class="card-canvas" id="card-canvas">
            <div class="card-tilt" id="card-tilt">
              <div class="card-orientation" id="card-orientation" data-orientation="portrait">
                <div class="card-body" id="card-body" data-side="front" tabindex="0" aria-label="名刺ビューアー">
                  <div class="card-face card-front">
                    <img src="/card-front.webp" alt="名刺 表面" draggable="false" />
                  </div>
                  <div class="card-face card-back">
                    <img src="/card-back.webp" alt="名刺 裏面" draggable="false" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="dir-file work-back">
            <a href="/#about" class="file-more">← cd /about</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <p class="footer-copy">&copy; はやしごと &mdash; hay@shigoto.dev</p>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/card.js"></script>
  </body>
</html>
